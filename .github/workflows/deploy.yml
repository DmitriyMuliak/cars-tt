# Deploy Pipeline — Weather Forecast App
#
# Builds the Vite app and deploys the dist/ folder to GitHub Pages.
# Triggers on every push to the main branch and supports manual dispatch.
#
# Required repository configuration:
#   Settings → Pages → Source: "GitHub Actions"
#   Settings → Secrets → Actions → VITE_OPENWEATHER_API_KEY: <your key>
#
# The base path is derived from the repository name at build time so the
# app works correctly when hosted at https://<user>.github.io/<repo>/.

name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

# Allow one concurrent deployment. If a new push lands while a deployment
# is in progress, cancel the in-progress run and start a fresh one.
concurrency:
  group: pages
  cancel-in-progress: true

# Minimal permissions: read source, write Pages, issue OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Build
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # VITE_BASE_PATH sets the Vite `base` option so asset URLs resolve
        # correctly under the GitHub Pages subdirectory (/<repo-name>/).
        run: pnpm build
        env:
          VITE_OPENWEATHER_API_KEY: ${{ secrets.VITE_OPENWEATHER_API_KEY }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      # Upload dist/ as a Pages artifact so the deploy job can consume it.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Deploy
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
